# LCD4Linux Configuration for ESP32-C3 with 128x32 OLED
#
# Copy this file to /etc/lcd4linux.conf
# Adjust the Port setting to match your ESP32-C3 serial device

Display SerialOLED {
    Driver   'SerialFile'
    Port     '/dev/ttyACM0'    # Change this to your ESP32-C3 port
    Speed     115200
    Size     '128x32'
}

# Text widget showing time
Widget TimeWidget {
    class  'Text'
    expression strftime('%H:%M:%S', time())
    width  10
    align  'C'
    update 1000
}

# Text widget showing date
Widget DateWidget {
    class  'Text'
    expression strftime('%Y-%m-%d', time())
    width  12
    align  'C'
    update 60000
}

# CPU usage bar
Widget CPUBar {
    class      'Bar'
    expression cpu('busy', 500)
    max        100
    length     16
    direction  'E'
    update     1000
}

# Memory usage text
Widget MemWidget {
    class      'Text'
    expression meminfo('MemUsed') / 1024 / 1024
    postfix    ' MB'
    width      8
    precision  0
    align      'R'
    update     5000
}

# Network received
Widget NetInWidget {
    class      'Text'
    expression netinfo('eth0', 'Rx_bytes', 1000) / 1024
    postfix    ' KB/s'
    width      10
    precision  1
    align      'R'
    update     1000
}

# Uptime widget
Widget UptimeWidget {
    class      'Text'
    expression uptime('%d days %H:%M')
    width      14
    align      'L'
    update     60000
}

# Hostname widget
Widget HostWidget {
    class      'Text'
    expression uname('nodename')
    width      12
    align      'L'
    update     3600000
}

# CPU temperature (if available)
Widget TempWidget {
    class      'Text'
    expression thermal('thermal_zone0', 'temp', 1000) / 1000
    postfix    '°C'
    width      6
    precision  1
    align      'R'
    update     2000
}

# Simple layout for 128x32 display
Layout TwoLineLayout {
    Row1 {
        Col1  'TimeWidget'
    }
    Row2 {
        Col1  'CPUBar'
    }
}

# More detailed layout
Layout DetailedLayout {
    Row1 {
        Col1  'HostWidget'
        Col16 'TimeWidget'
    }
    Row2 {
        Col1  'Text::CPU:'
        Col6  'CPUBar'
    }
    Row3 {
        Col1  'Text::Mem:'
        Col6  'MemWidget'
        Col16 'Text::Net:'
        Col21 'NetInWidget'
    }
    Row4 {
        Col1  'Text::Up:'
        Col5  'UptimeWidget'
    }
}

# Simple time and date layout
Layout TimeLayout {
    Row1 {
        Col1  'TimeWidget'
    }
    Row2 {
        Col1  'DateWidget'
    }
    Row3 {
        Col1  'Text::Uptime:'
        Col9  'UptimeWidget'
    }
}

# System monitor layout
Layout SystemLayout {
    Row1 {
        Col1  'HostWidget'
        Col15 'TimeWidget'
    }
    Row2 {
        Col1  'Text::CPU'
        Col6  'CPUBar'
        Col24 'TempWidget'
    }
    Row3 {
        Col1  'Text::Mem:'
        Col7  'MemWidget'
    }
    Row4 {
        Col1  'Text::Net:'
        Col7  'NetInWidget'
    }
}

# Select which layout to use
Display 'SerialOLED'
Layout  'TimeLayout'

# Variables (adjust as needed)
Variables {
    tick 500
    tack 100
}

# Plugins (enable what you need)
Plugin KVV {
}
Plugin MySQL {
}
Plugin Seti {
}
Plugin ISDN {
}


# === INSTRUCTIONS FOR USE ===
#
# 1. Install lcd4linux:
#    sudo apt-get install lcd4linux
#
# 2. Find your ESP32-C3 serial port:
#    ls /dev/ttyACM* or ls /dev/ttyUSB*
#
# 3. Update the Port setting above with your serial device
#
# 4. Copy this file:
#    sudo cp lcd4linux.conf /etc/lcd4linux.conf
#
# 5. Test the configuration:
#    sudo lcd4linux -F -f /etc/lcd4linux.conf
#
# 6. If it works, enable as a service:
#    sudo systemctl enable lcd4linux
#    sudo systemctl start lcd4linux
#
# 7. Try different layouts by changing the Layout line above:
#    - TimeLayout: Simple time/date display
#    - SystemLayout: System monitoring
#    - TwoLineLayout: Minimal 2-line display
#    - DetailedLayout: More comprehensive display


# === NOTES ===
#
# Driver 'SerialFile':
# - This driver doesn't exist in standard lcd4linux
# - You need to use a custom driver or script
# - Alternative: Create a pipe/FIFO and write formatted commands
#
# For direct integration, you would need to:
# 1. Create a custom lcd4linux driver for this protocol
# 2. Or use a bridge script that translates lcd4linux output to serial commands
#
# Bridge Script Example (lcd4linux-bridge.py):
# - Reads from lcd4linux
# - Converts to ESP32 serial protocol
# - Sends via serial port
#
# See lcd4linux-bridge.py in this repository for implementation.
