# Native LCD4Linux Configuration for ESP32-C3 OLED
# This config uses the compiled ESP32OLED driver directly
#
# Installation:
# 1. Compile lcd4linux with ESP32OLED driver (see COMPILE_NATIVE.md)
# 2. Copy this file: sudo cp lcd4linux-native.conf /etc/lcd4linux.conf
# 3. Edit Port setting below to match your ESP32-C3 device
# 4. Test: sudo lcd4linux -F -f /etc/lcd4linux.conf
# 5. Start: sudo systemctl start lcd4linux

Display ESP32 {
    Driver   'ESP32OLED'
    Port     '/dev/ttyACM0'     # Change to your ESP32-C3 serial port
    Speed    115200             # Baud rate
    Size     '128x32'           # Display size in pixels
    Font     '6x8'              # Font size
    Foreground 'ffffff'         # White
    Background '000000'         # Black
}

# Widget: Current Time
Widget TimeWidget {
    class      'Text'
    expression strftime('%H:%M:%S', time())
    width      8
    align      'L'
    update     1000
}

# Widget: Date
Widget DateWidget {
    class      'Text'
    expression strftime('%b %d', time())
    width      10
    align      'L'
    update     60000
}

# Widget: CPU Usage Percentage
Widget CPUWidget {
    class      'Text'
    expression cpu('busy', 500)
    postfix    '%'
    width      4
    precision  0
    align      'R'
    update     1000
}

# Widget: CPU Usage Bar
Widget CPUBar {
    class      'Bar'
    expression cpu('busy', 500)
    length     20
    max        100
    direction  'E'
    update     1000
}

# Widget: Memory Usage
Widget MemWidget {
    class      'Text'
    expression meminfo('MemUsed')/1024/1024
    postfix    'M'
    width      6
    precision  0
    align      'R'
    update     5000
}

# Widget: Memory Bar
Widget MemBar {
    class      'Bar'
    expression meminfo('MemUsed')
    max        meminfo('MemTotal')
    length     20
    direction  'E'
    update     5000
}

# Widget: Disk Usage
Widget DiskWidget {
    class      'Text'
    expression statfs('/', 'bavail') * statfs('/', 'bsize') / 1024 / 1024 / 1024
    postfix    'G free'
    width      10
    precision  1
    align      'R'
    update     60000
}

# Widget: Network RX
Widget NetRxWidget {
    class      'Text'
    expression netinfo('eth0', 'Rx_bytes', 1000) / 1024
    postfix    'K/s'
    width      8
    precision  0
    align      'R'
    update     1000
}

# Widget: Network TX  
Widget NetTxWidget {
    class      'Text'
    expression netinfo('eth0', 'Tx_bytes', 1000) / 1024
    postfix    'K/s'
    width      8
    precision  0
    align      'R'
    update     1000
}

# Widget: System Load
Widget LoadWidget {
    class      'Text'
    expression loadavg(1)
    width      5
    precision  2
    align      'R'
    update     5000
}

# Widget: Hostname
Widget HostWidget {
    class      'Text'
    expression uname('nodename')
    width      15
    align      'L'
    update     86400000
}

# Widget: Uptime
Widget UptimeWidget {
    class      'Text'
    expression uptime('%d day %H:%M')
    width      15
    align      'L'
    update     60000
}

# Widget: Temperature (adjust path for your system)
Widget TempWidget {
    class      'Text'
    expression thermal('thermal_zone0', 'temp', 1000) / 1000
    postfix    '°C'
    width      5
    precision  0
    align      'R'
    update     2000
}

# Widget: Static Labels
Widget LabelCPU {
    class 'Text'
    expression 'CPU:'
    width 4
    update 0
}

Widget LabelMem {
    class 'Text'
    expression 'Mem:'
    width 4
    update 0
}

Widget LabelNet {
    class 'Text'
    expression 'Net:'
    width 4
    update 0
}

Widget LabelLoad {
    class 'Text'
    expression 'Load:'
    width 5
    update 0
}


# ===== LAYOUTS =====

# Layout 1: Simple Time Display (4 lines for 32px height, ~6x8 font)
Layout SimpleTime {
    Row1 {
        Col1  'TimeWidget'
    }
    Row2 {
        Col1  'DateWidget'
    }
    Row3 {
        Col1  'HostWidget'
    }
    Row4 {
        Col1  'UptimeWidget'
    }
}

# Layout 2: System Monitor
Layout SystemMon {
    Row1 {
        Col1  'HostWidget'
        Col17 'TimeWidget'
    }
    Row2 {
        Col1  'LabelCPU'
        Col6  'CPUWidget'
        Col12 'LabelMem'
        Col17 'MemWidget'
    }
    Row3 {
        Col1  'LabelLoad'
        Col7  'LoadWidget'
        Col15 'TempWidget'
    }
    Row4 {
        Col1  'NetRxWidget'
        Col12 'NetTxWidget'
    }
}

# Layout 3: Bars Display
Layout BarsLayout {
    Row1 {
        Col1  'TimeWidget'
        Col12 'DateWidget'
    }
    Row2 {
        Col1  'LabelCPU'
        Col6  'CPUBar'
    }
    Row3 {
        Col1  'LabelMem'
        Col6  'MemBar'
    }
    Row4 {
        Col1  'LabelLoad'
        Col7  'LoadWidget'
    }
}

# Layout 4: Minimal Info
Layout Minimal {
    Row1 {
        Col1  'TimeWidget'
    }
    Row2 {
        Col1  'CPUWidget'
        Col8  'MemWidget'
    }
}


# ===== DISPLAY CONFIGURATION =====

# Select Display and Layout
Display   'ESP32'
Layout    'SystemMon'

# Variables
Variables {
    tick  500
    tack  100
}

# ===== CONFIGURATION NOTES =====
#
# Display Size: 128x32 pixels
# With 6x8 font: ~21 columns x 4 rows
#
# Available Layouts:
# - SimpleTime: Time, date, hostname, uptime
# - SystemMon: Comprehensive system monitoring
# - BarsLayout: Visual bars for CPU and memory
# - Minimal: Just time, CPU, and memory
#
# To change layout, edit the 'Layout' line above
#
# Network Interface:
# - Default is 'eth0'
# - Change to your interface: 'wlan0', 'enp0s3', etc.
# - Check with: ip link show
#
# Temperature:
# - Adjust 'thermal_zone0' in TempWidget
# - Find yours: ls /sys/class/thermal/
#
# Refresh rates (in milliseconds):
# - Fast updates (1000ms): Time, CPU, Network
# - Medium (5000ms): Memory, Load, Temperature
# - Slow (60000ms): Disk, Date, Uptime
#
